name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [sanity-publish]

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
      SANITY_DATASET: ${{ secrets.SANITY_DATASET }}
      SANITY_READ_TOKEN: ${{ secrets.SANITY_READ_TOKEN }}
      TIMEWEB_FTP_HOST: ${{ secrets.TIMEWEB_FTP_HOST }}
      TIMEWEB_FTP_PORT: ${{ secrets.TIMEWEB_FTP_PORT }}
      TIMEWEB_FTP_USER: ${{ secrets.TIMEWEB_FTP_USER }}
      TIMEWEB_FTP_PASSWORD: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
      TIMEWEB_FTP_PROTOCOL: ${{ secrets.TIMEWEB_FTP_PROTOCOL }}
      TIMEWEB_FTP_REMOTE_PATH: ${{ secrets.TIMEWEB_FTP_REMOTE_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify static fallback
        run: npm run verify
        env:
          CONTENT_SOURCE: static

      - name: Build published Sanity content
        run: npm run build
        env:
          CONTENT_SOURCE: sanity

      - name: Install FTP client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate deploy configuration
        run: |
          for name in TIMEWEB_FTP_HOST TIMEWEB_FTP_PORT TIMEWEB_FTP_USER TIMEWEB_FTP_PASSWORD TIMEWEB_FTP_PROTOCOL TIMEWEB_FTP_REMOTE_PATH; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done
          if [[ ! "$TIMEWEB_FTP_PORT" =~ ^[0-9]+$ ]] || (( TIMEWEB_FTP_PORT < 1 || TIMEWEB_FTP_PORT > 65535 )); then
            echo "TIMEWEB_FTP_PORT must be a valid numeric port." >&2
            exit 1
          fi
          if [[ ! "$TIMEWEB_FTP_PROTOCOL" =~ ^(ftp|ftps)$ ]]; then
            echo "TIMEWEB_FTP_PROTOCOL must be ftp|ftps." >&2
            exit 1
          fi
          if [[ "$TIMEWEB_FTP_REMOTE_PATH" == "/" || ! "$TIMEWEB_FTP_REMOTE_PATH" =~ ^/[A-Za-z0-9._/-]+$ ]]; then
            echo "TIMEWEB_FTP_REMOTE_PATH must be a safe absolute non-root directory." >&2
            exit 1
          fi

      - name: Deploy to Timeweb over FTP
        run: |
          if [[ "$TIMEWEB_FTP_PROTOCOL" == "ftps" ]]; then
            TLS_SETTINGS=$'set ftp:ssl-force true\nset ftp:ssl-protect-data true\nset ssl:verify-certificate yes'
          else
            TLS_SETTINGS=$'set ftp:ssl-force false\nset ftp:ssl-allow false'
          fi

          lftp -u "$TIMEWEB_FTP_USER","$TIMEWEB_FTP_PASSWORD" "ftp://$TIMEWEB_FTP_HOST:$TIMEWEB_FTP_PORT" <<EOF
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 30
          set ftp:passive-mode true
          $TLS_SETTINGS
          mirror --reverse --delete --verbose --parallel=4 dist/ "$TIMEWEB_FTP_REMOTE_PATH"
          bye
          EOF
